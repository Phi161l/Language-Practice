<!DOCTYPE html>
<html>
<head>
  <title>Browser Storage Demo</title>
  <style>
    body {
      font-family: Arial;
      padding: 40px;
    }

    button {
      margin: 5px;
      padding: 10px;
    }
  </style>
</head>

<body>

<h2>Browser Storage Experiment</h2>

<h3>Local Storage</h3>
<button id="saveLocal">Save</button>
<button id="readLocal">Read</button>
<button id="clearLocal">Clear</button>

<h3>Session Storage</h3>
<button id="saveSession">Save</button>
<button id="readSession">Read</button>
<button id="clearSession">Clear</button>

<h3>Cookies</h3>
<button id="setCookie">Set Cookie</button>
<button id="readCookie">Read Cookies</button>

<h3>IndexedDB</h3>
<button id="saveDB">Save Data</button>
<button id="readDB">Read Data</button>

<script src="storage.js"></script>

</body>
</html>
